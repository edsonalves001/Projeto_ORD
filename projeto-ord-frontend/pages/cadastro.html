<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../assets/favicon.ico" type="image/x-icon" />
  <!-- FONTS: -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mada:wght@200..900&display=swap" rel="stylesheet" />
  <!-- CSS: -->
  <link rel="stylesheet" href="../css/cadastro.css" />
  <title>Projeto ORD - Cadastro</title>
</head>

<body>
  <main>
    <header>
      <img src="../assets/Logotipo-Claro.png" alt="Logo do Ord, mas na versão toda branca." />
    </header>
    <!-- lembrem-se que alt deve ser descritivo assim pra leitores de tela de PCDs-->
    <div class="card-cadastro">
      <img src="../assets/cadastro.jpg" alt="Imagem de uma raposa na neve observando o ambiente" />

      <form action="post">
        <h1>Seja Bem-vindo!</h1>
        <input type="text" id="email" placeholder="E-mail" />
        <input type="text" id="senha" placeholder="Senha" />
        <input type="text" id="confirmarSenha" placeholder="Confirmar senha">
        <input type="submit" value="Cadastrar" />
        <p>
          Já possui uma conta? Entre
          <a href="../pages/login.html">aqui!</a>
        </p>
      </form>
    </div>
  </main>
</body>

</html>
